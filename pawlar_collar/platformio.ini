; --- 1. SHARED SETTINGS (Applies to all) ---
[env]
platform = espressif32
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv

; ⚡ CRITICAL USB FLAGS FOR C3 MINI ⚡
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

monitor_dtr = 1
monitor_rts = 1

lib_deps = 
    bblanchon/ArduinoJson@^6.0
    mikalhart/TinyGPSPlus @ ^1.0.3
    blynkkk/Blynk @ ^1.3.2
    knolleary/PubSubClient @ ^2.8
    dfrobot/DFRobot_MAX17043 @ ^1.0.0
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4  ; <--- ADDED FOR LCD

; --- 2. MAIN PROJECT (The GPS Collar) ---
[env:lolin_c3_mini]
build_src_filter = +<*> -<tests/>

; --- 3. TEST: COLLAR ---
[env:test_collar]
build_src_filter = +<tests/test_collar.cpp>

; --- 4. TEST: DOOR ---
[env:test_door]
build_src_filter = +<tests/test_door.cpp>

; --- 5. TEST: BATTERY SAFETY (Emergency No-TP40 Mode) ---
[env:test_battery]
build_src_filter = +<tests/battery_safety_test.cpp>