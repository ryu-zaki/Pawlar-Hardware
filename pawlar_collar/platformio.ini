; --- 1. SHARED SETTINGS ---
[env]
platform = espressif32
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv

; ⚡ CRITICAL USB & GSM FLAGS ⚡
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D TINY_GSM_MODEM_A7670         ; Global define for TinyGSM
    -D MQTT_MAX_PACKET_SIZE=512      ; Allow for long JSON strings

monitor_dtr = 1
monitor_rts = 1

lib_deps = 
    plerup/EspSoftwareSerial @ ^8.1.0
    vshymanskyy/TinyGSM @ ^0.11.7
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.0
    mikalhart/TinyGPSPlus @ ^1.0.3
    blynkkk/Blynk @ ^1.3.2
    dfrobot/DFRobot_MAX17043 @ ^1.0.0
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4

; --- 2. MAIN PROJECT ---
[env:lolin_c3_mini]
build_src_filter = +<*> -<tests/>

; --- 3. TEST: COLLAR ---
[env:test_collar]
build_src_filter = +<tests/test_collar.cpp>

; --- 4. TEST: DOOR ---
[env:test_door]
build_src_filter = +<tests/test_door.cpp>

; --- 5. TEST: BATTERY SAFETY ---
[env:test_battery]
build_src_filter = +<tests/battery_safety_test.cpp>